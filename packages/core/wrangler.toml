name = "setupmanagerhud"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Static assets (Vite build output)
[assets]
directory = "./dist"

# Durable Objects for real-time WebSocket
[[durable_objects.bindings]]
name = "DASHBOARD_ROOM"
class_name = "DashboardRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DashboardRoom"]

# D1 for event persistence.
# Cloudflare's Deploy Button can provision this resource because the binding is
# declared here. Manual CLI users should replace database_id with the UUID from:
# npx wrangler d1 create setupmanagerhud-events
[[d1_databases]]
binding = "DB"
database_name = "setupmanagerhud-events"
database_id = "setupmanagerhud-events"

# Webhook token authentication (required for /webhook)
# Set this with: npx wrangler secret put WEBHOOK_TOKEN

# Cloudflare Access JWT validation (optional but recommended)
# Set these to enable Access JWT verification on dashboard routes.
# The webhook endpoint (/webhook) remains network-reachable for devices,
# but the Worker rejects requests unless the Authorization header token matches
# WEBHOOK_TOKEN. Setup Manager sends the raw token; Bearer tokens are also accepted.
# Uncomment and fill in after setting up Cloudflare Access:
# [vars]
# CF_ACCESS_AUD = "paste-your-audience-tag-here"
# CF_ACCESS_TEAM_DOMAIN = "your-team.cloudflareaccess.com"
