name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'wrangler.toml'
      - 'package.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN secret. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Missing CLOUDFLARE_ACCOUNT_ID secret. Find it at dash.cloudflare.com under any zone's Overview page."
            exit 1
          fi

      - name: Check D1 database ID
        run: |
          if grep -q "00000000-0000-0000-0000-000000000000" wrangler.toml; then
            echo "::error::D1 database_id is still a placeholder. Create your database: npx wrangler d1 create setupmanagerhud-events, then update wrangler.toml with the real ID."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync WEBHOOK_TOKEN secret
        if: ${{ secrets.WEBHOOK_TOKEN != '' }}
        run: echo "${{ secrets.WEBHOOK_TOKEN }}" | npx wrangler secret put WEBHOOK_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
