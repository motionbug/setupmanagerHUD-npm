name = "setupmanagerhud"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Static assets (copied from core package by postinstall)
[assets]
directory = "./public"

# Durable Objects for real-time WebSocket
[[durable_objects.bindings]]
name = "DASHBOARD_ROOM"
class_name = "DashboardRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DashboardRoom"]

# D1 for event persistence
# For local development, use any valid UUID (wrangler creates a local SQLite file).
# For production, replace with your actual D1 database ID from:
# npx wrangler d1 create setupmanagerhud-events
[[d1_databases]]
binding = "DB"
database_name = "setupmanagerhud-events"
database_id = "00000000-0000-0000-0000-000000000000"

# Webhook token authentication (required for /webhook)
# Set this with: npx wrangler secret put WEBHOOK_TOKEN
# For local development, create a .dev.vars file with:
# WEBHOOK_TOKEN=your-test-token

# Cloudflare Access JWT validation (optional but recommended)
# Set these to enable Access JWT verification on dashboard routes.
# Uncomment and fill in after setting up Cloudflare Access:
# [vars]
# CF_ACCESS_AUD = "paste-your-audience-tag-here"
# CF_ACCESS_TEAM_DOMAIN = "your-team.cloudflareaccess.com"

# Branding customization (optional)
# Uncomment and customize:
# [vars]
# APP_TITLE = "My Company Setup Dashboard"
# LOGO_URL = "/logo.png"
